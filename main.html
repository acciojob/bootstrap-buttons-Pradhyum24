<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <h3 class="fw-medium">Bootstrap Buttons</h3>
            </div>

            <button id="button-1" class="btn btn-primary col-1">Button-1</button>
            <button id="button-2" class="btn btn-outline-secondary col-1">Button-2</button>
            <button id="button-3" class="btn btn-success btn-lg col-1">Button-3</button>
            <button id="button-4" class="btn btn-danger btn-sm col-1">Button-4</button>
            <button id="button-5" class="btn btn-warning btn-lg vw-100">Button-5</button>
            <button id="button-6" class="btn btn-info disabled col-1">Button-6</button>
            <button id="button-7" class="btn btn-light col-1">Button-7</button>
            <button id="button-8" class="btn btn-link col-1">Button-8</button>

        </div>
    </div>

    <script src="./script.js"></script>

</body>

</html>
